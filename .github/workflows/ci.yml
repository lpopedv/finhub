name: Elixir CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

env:
    MIX_ENV: test
    ELIXIR_VERSION: 1.19.5
    OTP_VERSION: 28.3.1

jobs:
    build:
        name: Build and cache
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Set up Elixir
              uses: erlef/setup-beam@v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Restore dependencies cache
              id: deps-cache
              uses: actions/cache/restore@v4
              with:
                  path: deps
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-deps_cache-${{ hashFiles('**/mix.lock') }}
            - name: Restore build cache
              id: build-cache
              uses: actions/cache/restore@v4
              with:
                  path: _build/test
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-build_cache-${{ hashFiles('**/mix.lock', 'apps/**/*.ex') }}
                  restore-keys: |
                      ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-build_cache-
            - name: Install dependencies
              run: mix deps.get
            - name: Compile dependencies
              run: mix deps.compile --skip-umbrella-children
            - name: Compile application
              run: mix compile --warnings-as-errors
            - name: Save dependencies cache
              uses: actions/cache/save@v4
              if: always()
              with:
                  path: deps
                  key: ${{ steps.deps-cache.outputs.cache-primary-key }}
            - name: Save build cache
              uses: actions/cache/save@v4
              if: always()
              with:
                  path: _build/test
                  key: ${{ steps.build-cache.outputs.cache-primary-key }}

    lint:
        name: Run linter and security checks
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Set up Elixir
              uses: erlef/setup-beam@v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Restore dependencies cache
              id: deps-cache
              uses: actions/cache/restore@v4
              with:
                  path: deps
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-deps_cache-${{ hashFiles('**/mix.lock') }}
            - name: Restore build cache
              id: build-cache
              uses: actions/cache/restore@v4
              with:
                  path: _build/test
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-build_cache-${{ hashFiles('**/mix.lock', 'apps/**/*.ex') }}
                  restore-keys: |
                      ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-build_cache-
            - name: Check unused deps
              run: mix deps.unlock --check-unused
            - name: Check code format
              run: mix format --check-formatted
            - name: Run Credo
              run: mix credo --strict
            - name: Security audit
              run: |
                  mix hex.audit
                  mix deps.audit

    dialyzer:
        name: Run dialyzer
        runs-on: ubuntu-latest
        env:
            MIX_ENV: dev
        steps:
            - uses: actions/checkout@v3
            - name: Set up Elixir
              uses: erlef/setup-beam@v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Restore PLT cache
              id: plt-cache
              uses: actions/cache/restore@v4
              with:
                  path: _build/dev/*.plt*
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-otp-${{ env.OTP_VERSION }}-dialyzer-plt-${{ hashFiles('**/mix.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-otp-${{ env.OTP_VERSION }}-dialyzer-plt-
            - name: Restore dependencies cache (dev)
              id: deps-cache
              uses: actions/cache/restore@v4
              with:
                  path: deps
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-dev-deps_cache-${{ hashFiles('**/mix.lock') }}
            - name: Restore build cache (dev)
              id: build-cache
              uses: actions/cache/restore@v4
              with:
                  path: _build/dev
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-dev-build_cache-${{ hashFiles('**/mix.lock', 'apps/**/*.ex') }}
                  restore-keys: |
                      ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-dev-build_cache-
            - name: Install dependencies
              run: mix deps.get
            - name: Compile dependencies
              run: mix deps.compile
            - name: Compile application
              run: mix compile
            - name: Build PLT
              run: mix dialyzer --plt
            - name: Run Dialyzer
              run: mix dialyzer
            - name: Save dependencies cache (dev)
              uses: actions/cache/save@v4
              if: always()
              with:
                  path: deps
                  key: ${{ steps.deps-cache.outputs.cache-primary-key }}
            - name: Save build cache (dev)
              uses: actions/cache/save@v4
              if: always()
              with:
                  path: _build/dev
                  key: ${{ steps.build-cache.outputs.cache-primary-key }}
            - name: Save PLT cache
              uses: actions/cache/save@v4
              if: always()
              with:
                  path: _build/dev/*.plt*
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-otp-${{ env.OTP_VERSION }}-dialyzer-plt-${{ hashFiles('**/mix.lock') }}

    test:
        name: Run tests
        needs: build
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: finhub_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v3
            - name: Set up Elixir
              uses: erlef/setup-beam@v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Restore dependencies cache
              id: deps-cache
              uses: actions/cache/restore@v4
              with:
                  path: deps
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-deps_cache-${{ hashFiles('**/mix.lock') }}
            - name: Restore build cache
              id: build-cache
              uses: actions/cache/restore@v4
              with:
                  path: _build/test
                  key: ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-build_cache-${{ hashFiles('**/mix.lock', 'apps/**/*.ex') }}
                  restore-keys: |
                      ${{ runner.os }}-elixir-${{ env.ELIXIR_VERSION }}-test-build_cache-
            - name: Run migrations
              run: mix do ecto.create + ecto.migrate
            - name: Run tests
              run: mix test
